<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>经历详情 · 李欣怡作品集</title>
  <style>
    :root {
      --sage: #A9BF7D;
      --sage-dark: #8DA361;
      --sage-soft: #E3EBD1;
      --ink: #2A3654;
      --bg: #E6E7DE;
      --surface: #FFFFFF;
      --muted: #6B7280;
      --radius: 20px;
      --maxw: 820px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg); color: var(--ink); line-height: 1.9; padding: 48px 20px 80px;
    }
    .wrap { max-width: var(--maxw); margin: 0 auto; }
    .back {
      display: inline-flex; align-items: center; gap: 6px; color: var(--sage-dark);
      text-decoration: none; font-weight: 600; margin-bottom: 28px; font-size: 15px;
    }
    .back:hover { color: var(--ink); }
    .tag {
      display: inline-block; background: var(--sage-soft); color: var(--sage-dark);
      padding: 4px 14px; border-radius: 999px; font-size: 13px; font-weight: 700; margin-bottom: 16px;
    }
    h1 { font-family: 'Outfit', 'Montserrat', 'Noto Sans SC', sans-serif; font-size: 32px; line-height: 1.4; margin-bottom: 8px; }
    .company { font-size: 18px; color: var(--ink); font-weight: 600; margin-bottom: 6px; }
    .meta { color: var(--muted); font-size: 14px; margin-bottom: 32px; }
    .cover {
      width: 100%; aspect-ratio: 16 / 9; border-radius: var(--radius); overflow: hidden;
      background: linear-gradient(135deg, var(--sage), var(--sage-dark)); margin-bottom: 36px;
      display: flex; align-items: center; justify-content: center; color: #fff; font-size: 15px;
    }
    .cover img { width: 100%; height: 100%; object-fit: cover; }
    p { font-size: 17px; color: #3a4050; margin-bottom: 20px; }
    h2 { font-size: 20px; margin: 36px 0 14px; color: var(--ink); }
    ul { padding-left: 22px; margin-bottom: 20px; }
    li { font-size: 16px; color: #3a4050; margin-bottom: 8px; }
    .footer { margin-top: 48px; text-align: center; color: var(--muted); font-size: 13px; }
    .empty { text-align: center; color: var(--muted); padding: 60px 0; }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="index.html#experience">← 返回作品集</a>
    <div id="content"><div class="empty">加载中…</div></div>
    <div class="footer">© 2026 李欣怡 · 内容策划 / 短视频编导作品集</div>
  </div>

  <script>
    (function () {
      const params = new URLSearchParams(location.search);
      const id = params.get("id");
      const box = document.getElementById("content");

      fetch("content.json", { cache: "no-store" })
        .then((r) => r.json())
        .then((data) => {
          const list = Array.isArray(data.experience) ? data.experience : [];
          const exp = list.find((e) => e.id === id) || (list[0] || null);
          if (!exp) { box.innerHTML = '<div class="empty">未找到对应经历。</div>'; return; }
          document.title = (exp.role || "经历") + " · 李欣怡作品集";
          const tag = exp.tag ? `<span class="tag">${exp.tag}</span>` : "";
          const coverImg = exp.cover
            ? `<div class="cover"><img src="${exp.cover}" alt="" onerror="this.parentElement.style.background='linear-gradient(135deg, var(--sage), var(--sage-dark))';this.remove();" /></div>`
            : `<div class="cover">经历配图（可在 content.json 的 experience 中补充 cover 字段）</div>`;
          const desc = (exp.description || "").split(/\n+/).filter(Boolean).map((t) => `<p>${t}</p>`).join("");
          box.innerHTML = `
            ${tag}
            <h1>${exp.role || ""}</h1>
            <div class="company">${exp.company || ""}</div>
            <div class="meta">${exp.location ? exp.location + " ｜ " : ""}${exp.period || ""}</div>
            ${coverImg}
            ${desc || '<p>暂无详细描述，可在编辑模式中补充。</p>'}
          `;
        })
        .catch((err) => {
          box.innerHTML = '<div class="empty">内容加载失败，请确认 content.json 与本站同目录部署。<br>' + (err && err.message ? err.message : "") + '</div>';
        });
    })();
  </script>
</body>
</html>
