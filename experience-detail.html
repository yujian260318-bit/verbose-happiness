<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>经历详情 · 李欣怡作品集</title>
  <link rel="stylesheet" href="styles.css?v=24" />
  <style>
    :root {
      --sage: #A9BF7D; --sage-dark: #8DA361; --sage-soft: #E3EBD1;
      --ink: #2A3654; --bg: #E6E7DE; --surface: #FFFFFF; --muted: #6B7280;
      --radius: 20px; --maxw: 820px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--ink); line-height: 1.9; padding: 48px 20px 80px; }
    .wrap { max-width: var(--maxw); margin: 0 auto; }
    .back { display: inline-flex; align-items: center; gap: 6px; color: var(--sage-dark); text-decoration: none; font-weight: 600; margin-bottom: 28px; font-size: 15px; }
    .back:hover { color: var(--ink); }
    .tag { display: inline-block; background: var(--sage-soft); color: var(--sage-dark); padding: 4px 14px; border-radius: 999px; font-size: 13px; font-weight: 700; margin-bottom: 16px; }
    h1 { font-family: 'Outfit','Montserrat','Noto Sans SC',sans-serif; font-size: 32px; line-height: 1.4; }
    .company { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
    .meta { color: var(--muted); font-size: 14px; margin-bottom: 32px; }
    .footer { margin-top: 48px; text-align: center; color: var(--muted); font-size: 13px; }
    .empty { text-align: center; color: var(--muted); padding: 60px 0; }
    .ed-head { margin-bottom: 8px; }
    .ed-canvas { position: relative; margin-top: 24px; min-height: 200px; }
    .ed-block { position: absolute; }
    .ed-canvas--edit { min-height: 420px; border: 2px dashed var(--sage); border-radius: 16px; padding: 8px; background: rgba(227,235,209,0.25); }
    .ed-canvas--edit .ed-block { background: #fff; border: 1px solid #D1D5C7; border-radius: 12px; padding: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
    .ed-block--text .ed-text { outline: none; font-size: 17px; color: #3a4050; line-height: 1.9; }
    .ed-block--image .ed-img, .ed-block--video { width: 100%; display: block; border-radius: 10px; }
    .ed-block--heading .ed-heading { font-size: 21px; margin: 0; color: var(--ink); outline: none; }
    .ed-links { display: flex; flex-wrap: wrap; gap: 10px; }
    .ed-links a { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; background: var(--sage-soft); color: var(--sage-dark); border-radius: 999px; text-decoration: none; font-weight: 600; font-size: 14px; }
    .ed-bar { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; cursor: grab; }
    .ed-grip { font-size: 12px; color: var(--muted); user-select: none; }
    .ed-del { margin-left: auto; border: none; background: #e57373; color: #fff; border-radius: 6px; width: 22px; height: 22px; cursor: pointer; line-height: 1; }
    .ed-resize { position: absolute; right: 2px; bottom: 2px; width: 16px; height: 16px; background: var(--sage-dark); border-radius: 3px; cursor: nwse-resize; }
    .ed-toolbar { display: flex; flex-wrap: wrap; gap: 8px; margin: 16px 0; }
    .ed-toolbar button { padding: 8px 14px; border: none; border-radius: 999px; background: var(--ink); color: #fff; font-weight: 600; cursor: pointer; font-size: 14px; }
    .ed-toolbar .ed-save { background: var(--sage-dark); }
    .ed-head .tag { margin-bottom: 16px; }
    .ed-head h1 { margin-bottom: 8px; }
    .ed-hint { background: #FFF7E6; border: 1px solid #FFE08A; color: #8a6d00; padding: 10px 14px; border-radius: 10px; margin: 16px 0; font-size: 14px; }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="index.html#experience">← 返回作品集</a>
    <div id="content"><div class="empty">加载中…</div></div>
    <div class="footer">© 2026 李欣怡 · 内容策划 / 短视频编导作品集</div>
  </div>

  <script>
    (function () {
      const params = new URLSearchParams(location.search);
      const id = params.get("id");
      const editMode = params.get("edit") === "1";
      const box = document.getElementById("content");

      fetch("content.json", { cache: "no-store" })
        .then((r) => r.json())
        .then((data) => {
          window.__works = Array.isArray(data.works) ? data.works : [];
          const list = Array.isArray(data.experience) ? data.experience : [];
          const exp = list.find((e) => e.id === id) || (list[0] || null);
          if (!exp) { box.innerHTML = '<div class="empty">未找到对应经历。</div>'; return; }
          if (editMode) {
            const hint = document.createElement("div");
            hint.className = "ed-hint";
            hint.innerHTML = "🛠 <b>编辑模式</b>：拖动块的「✥ 拖动」条移动位置，拖右下角改大小；工具栏可插入文字/图片/视频框；改完点「💾 保存」。保存需输入 GitHub Token（仅本次使用）。";
            box.appendChild(hint);
          }
          PortfolioEditor.render(box, exp, { editable: editMode, source: "exp" });
        })
        .catch((err) => {
          box.innerHTML = '<div class="empty">内容加载失败：' + (err && err.message ? err.message : "") + '</div>';
        });
    })();
  </script>
  <script src="editor.js?v=1"></script>
  <script src="experience-modal.js?v=1"></script>
</body>
</html>
